<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>
	<section>
		<!-- Start Slider  -->

		<div id="carouselExample" class="carousel slide">
			<div class="carousel-inner">
				<div class="carousel-item active">
					<img src="/img/ecom1.png" class="d-block w-100 carousel-img" alt="...">
				</div>
				<div class="carousel-item">
					<img src="/img/ecom3.jpg" class="d-block w-100 carousel-img" alt="...">
				</div>
				<div class="carousel-item">
					<img src="/img/ecom2.jpg" class="d-block w-100 carousel-img" alt="...">
				</div>
			</div>
			<button class="carousel-control-prev" type="button"
				data-bs-target="#carouselExample" data-bs-slide="prev">
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Previous</span>
			</button>
			<button class="carousel-control-next" type="button"
				data-bs-target="#carouselExample" data-bs-slide="next">
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Next</span>
			</button>
		</div>

		<!-- End Slider  -->

		<!-- Start Category Module -->
		<div class="container my-5">
			<div class="row">
				<h3 class="text-center mb-4 fw-bold">Categories</h3>
				<div class="col-md-2 col-sm-4 col-6" th:each="c:${category}">
					<div class="category-card">
						<div class="category-circle-wrapper">
							<img th:src="@{'/img/category_img/'+${c.imageName}}" class="category-img" alt="category">
						</div>
						<div>
							<a th:href="@{'/products?category='+${c.name}}" class="category-title">[[${c.name}]]</a>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!-- End Category Module -->

		<!-- Start Latest Product Module -->
		<div class="container-fluid bg-light py-5">
			<div class="container">
				<h3 class="text-center mb-5 fw-bold">Latest Products</h3>
				<div class="row">
					<div class="col-md-3 col-sm-6 mb-4" th:each="p:${products}">
						<div class="card card-sh h-100">
							<div class="card-body product-card-body">
								<div class="product-img-wrapper">
									<img alt="product" th:src="@{'/img/product_img/'+${p.image}}" class="product-img">
								</div>
								<p class="text-center mt-2 mb-0 fw-semibold">
									<a th:href="@{'/product/'+${p.id}}" class="text-decoration-none text-dark">[[${p.title}]]</a>
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>


		<!-- End Latest Product Module -->
	</section>
</body>
</html>
